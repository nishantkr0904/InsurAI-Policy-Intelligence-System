version: "3.9"

# InsurAI – Local Development Services
# Architecture ref: docs/system-architecture.md §12 – Deployment Architecture
#
# Services defined here:
#   postgresql  – Relational store for metadata, users, audit logs
#   minio       – S3-compatible object store for raw policy documents
#   redis       – Broker for Celery task queue + response caching
#   createbuckets – One-shot init container that creates the default MinIO bucket
#
# Keycloak will be added in Phase P2 hardening (currently stubbed in config).
# Run: docker compose up -d

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgresql:
    image: postgres:16-alpine
    container_name: insurai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: insurai
      POSTGRES_PASSWORD: insurai
      POSTGRES_DB: insurai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insurai -d insurai_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # MinIO (S3-compatible object storage)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: insurai_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # One-shot bucket initializer (runs once, exits cleanly)
  # ---------------------------------------------------------------------------
  createbuckets:
    image: minio/mc:latest
    container_name: insurai_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/insurai-documents;
        mc anonymous set none local/insurai-documents;
        echo 'Bucket insurai-documents ready.';
        exit 0;
      "

  # ---------------------------------------------------------------------------
  # Redis 7 (task broker + cache)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: insurai_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:
  redis_data:
