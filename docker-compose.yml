# InsurAI – Local Development Services
# Architecture ref: docs/system-architecture.md §12 – Deployment Architecture
#
# Services defined here:
#   postgresql  – Relational store for metadata, users, audit logs
#   minio       – S3-compatible object store for raw policy documents
#   redis       – Broker for Celery task queue + response caching
#   createbuckets – One-shot init container that creates the default MinIO bucket
#
# Keycloak will be added in Phase P2 hardening (currently stubbed in config).
# Run: docker compose up -d

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgresql:
    image: postgres:16-alpine
    container_name: insurai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: insurai
      POSTGRES_PASSWORD: insurai
      POSTGRES_DB: insurai_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insurai -d insurai_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # MinIO (S3-compatible object storage)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: insurai_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # One-shot bucket initializer (runs once, exits cleanly)
  # ---------------------------------------------------------------------------
  createbuckets:
    image: minio/mc:latest
    container_name: insurai_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/insurai-documents;
        mc anonymous set none local/insurai-documents;
        echo 'Bucket insurai-documents ready.';
        exit 0;
      "

  # ---------------------------------------------------------------------------
  # Redis 7 (task broker + cache)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: insurai_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # etcd – Milvus metadata store (internal only)
  # ---------------------------------------------------------------------------
  etcd:
    image: quay.io/coreos/etcd:v3.5.14
    container_name: insurai_etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
      --advertise-client-urls=http://etcd:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ---------------------------------------------------------------------------
  # MinIO for Milvus segment storage (separate from application MinIO)
  # ---------------------------------------------------------------------------
  minio-milvus:
    image: minio/minio:latest
    container_name: insurai_milvus_minio
    restart: unless-stopped
    command: server /milvus/minio --console-address ":9003"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000" # Milvus MinIO S3 (separate from app MinIO on 9000)
      - "9003:9003" # Milvus MinIO console
    volumes:
      - milvus_minio_data:/milvus/minio
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Milvus standalone – vector database
  # ---------------------------------------------------------------------------
  milvus:
    image: milvusdb/milvus:v2.4.9
    container_name: insurai_milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio-milvus:9000
    ports:
      - "19530:19530" # gRPC API (pymilvus connects here)
      - "9091:9091" # Metrics / health
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio-milvus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  postgres_data:
  minio_data:
  redis_data:
  etcd_data:
  milvus_minio_data:
  milvus_data:
